syntax = "proto3";

package org.apache.accumulo.server.fs.pvc;

option java_package = "org.apache.accumulo.server.fs.pvc.proto";
option java_outer_classname = "PvcFileServiceProto";
option java_multiple_files = true;

service PvcFileService {
  rpc ReadFile(ReadFileRequest) returns (stream FileChunk);
  rpc WriteFile(stream WriteFileRequest) returns (WriteFileResponse);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc GetFileStatus(GetFileStatusRequest) returns (FileStatusResponse);
  rpc Rename(RenameRequest) returns (RenameResponse);
  rpc Mkdirs(MkdirsRequest) returns (MkdirsResponse);
}

message ReadFileRequest {
  string path = 1;
  int64 offset = 2;
  int64 length = 3; // 0 = read to end
}

message FileChunk {
  bytes data = 1;
  int64 offset = 2;
  bool last = 3;
}

message WriteFileRequest {
  oneof request {
    WriteFileHeader header = 1;
    FileChunk chunk = 2;
  }
}

message WriteFileHeader {
  string path = 1;
  bool overwrite = 2;
  bool syncable = 3;
  int32 buffer_size = 4;
  int64 block_size = 5;
}

message WriteFileResponse {
  bool success = 1;
  int64 bytes_written = 2;
  string error = 3;
}

message DeleteFileRequest {
  string path = 1;
  bool recursive = 2;
}

message DeleteFileResponse {
  bool success = 1;
}

message ListFilesRequest {
  string path = 1;
}

message ListFilesResponse {
  repeated FileStatusProto files = 1;
}

message GetFileStatusRequest {
  string path = 1;
}

message FileStatusResponse {
  bool exists = 1;
  FileStatusProto status = 2;
}

message FileStatusProto {
  string path = 1;
  int64 length = 2;
  bool is_directory = 3;
  int64 modification_time = 4;
  int64 access_time = 5;
  int32 permission = 6;
}

message RenameRequest {
  string source = 1;
  string destination = 2;
}

message RenameResponse {
  bool success = 1;
}

message MkdirsRequest {
  string path = 1;
  int32 permission = 2;
}

message MkdirsResponse {
  bool success = 1;
}
